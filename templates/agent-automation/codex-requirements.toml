allowed_approval_policies = ["untrusted"]
allowed_approvals_reviewers = ["user"]
allowed_web_search_modes = ["cached"]
allow_remote_control = false
default_permissions = "agent_safe_workspace"

[allowed_permission_profiles]
":read-only" = true
agent_safe_workspace = true

[permissions.agent_safe_workspace]
description = "Managed workspace access with command network and credential reads denied."
extends = ":workspace"

[permissions.agent_safe_workspace.filesystem]
glob_scan_max_depth = 4

[permissions.agent_safe_workspace.filesystem.":workspace_roots"]
"**/.env" = "deny"
"**/.env.local" = "deny"
"**/.env.*.local" = "deny"
"**/*.key" = "deny"
"**/*.pem" = "deny"

[permissions.agent_safe_workspace.network]
enabled = false

[permissions.filesystem]
deny_read = [
  "~/.aws",
  "~/.codex/auth.json",
  "~/.config/gh/hosts.yml",
  "~/.docker/config.json",
  "~/.gnupg",
  "~/.kube",
  "~/.netrc",
  "~/.npmrc",
  "~/.pypirc",
  "~/.ssh",
]

[features]
browser_use = false
browser_use_external = false
browser_use_full_cdp_access = false
computer_use = false
hooks = true
in_app_browser = false

[hooks]
managed_dir = "/etc/agent-safety"

[[hooks.PreToolUse]]
matcher = "^(Bash|apply_patch)$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "python3 /etc/agent-safety/guard-agent-command.py"
timeout = 5
statusMessage = "Checking managed destructive-command policy"

[rules]
prefix_rules = [
  { pattern = [{ any_of = ["rm", "rmdir"] }], decision = "forbidden", justification = "Recursive and untracked deletions must be performed manually." },
  { pattern = [{ token = "git" }, { any_of = ["clean", "filter-branch", "filter-repo", "reset", "restore"] }], decision = "forbidden", justification = "Commands that can discard work or rewrite history are blocked." },
  { pattern = [{ token = "git" }, { any_of = ["branch", "commit", "merge", "push", "rebase", "tag"] }], decision = "prompt", justification = "Repository history and remote changes require explicit approval." },
  { pattern = [{ any_of = ["sudo", "doas", "mkfs", "newfs", "shred", "wipefs"] }], decision = "forbidden", justification = "Privilege escalation and device-destructive commands are blocked." },
  { pattern = [{ any_of = ["terraform", "tofu"] }, { token = "destroy" }], decision = "forbidden", justification = "Infrastructure destruction must be performed manually." },
  { pattern = [{ token = "kubectl" }, { any_of = ["delete", "drain"] }], decision = "forbidden", justification = "Destructive cluster operations must be performed manually." },
  { pattern = [{ token = "helm" }, { any_of = ["delete", "uninstall"] }], decision = "forbidden", justification = "Release deletion must be performed manually." },
  { pattern = [{ any_of = ["aws", "az", "docker", "gcloud", "gh", "helm", "kubectl", "podman", "terraform", "tofu"] }], decision = "prompt", justification = "External systems and infrastructure require explicit approval." },
  { pattern = [{ any_of = ["chmod", "chown", "kill", "killall", "pkill"] }], decision = "prompt", justification = "Permission and process changes require explicit approval." },
  { pattern = [{ any_of = ["curl", "wget"] }], decision = "prompt", justification = "Direct network access requires explicit approval." },
]
