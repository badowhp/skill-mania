name: Full Skill Regression Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-skill-regression-${{ github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  evaluate:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: skill-evals
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Validate deterministic release gate
        run: ./scripts/check-release-ready.sh
      - name: Resolve immutable release baseline
        id: baseline
        run: |
          latest_tag="$(git tag --list 'v[0-9]*' --sort=-v:refname | sed -n '1p')"
          if [[ -z "$latest_tag" ]]; then
            echo "a v* release tag is required for a full regression comparison" >&2
            exit 1
          fi
          baseline_commit="$(git rev-list -n 1 "$latest_tag")"
          baseline_dir="$RUNNER_TEMP/skill-mania-baseline"
          git worktree add --detach "$baseline_dir" "$baseline_commit"
          python3 scripts/check-secret-patterns.py --root "$baseline_dir"
          {
            echo "tag=$latest_tag"
            echo "commit=$baseline_commit"
            echo "skills_dir=$baseline_dir/skills"
          } >> "$GITHUB_OUTPUT"
      - name: Compare every skill with the latest release
        env:
          OPENAI_API_KEY: ${{ secrets.SKILL_EVALS_OPENAI_API_KEY }}
          BASELINE_TAG: ${{ steps.baseline.outputs.tag }}
          BASELINE_COMMIT: ${{ steps.baseline.outputs.commit }}
          BASELINE_SKILLS_DIR: ${{ steps.baseline.outputs.skills_dir }}
        run: |
          python3 scripts/run-skill-evals.py \
            --skills all \
            --model-route balanced \
            --judge-route quality \
            --routing-route throughput \
            --max-cases-per-skill 0 \
            --maximum-model-calls 400 \
            --maximum-api-requests 600 \
            --maximum-total-tokens 5000000 \
            --baseline-skills-dir "$BASELINE_SKILLS_DIR" \
            --baseline-label "$BASELINE_TAG" \
            --baseline-commit "$BASELINE_COMMIT" \
            --output eval-workspace
      - name: Publish job summary
        if: always()
        run: |
          if [[ -f eval-workspace/summary.md ]]; then
            cat eval-workspace/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Retain regression evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: full-skill-regression-${{ github.run_id }}
          path: eval-workspace
          if-no-files-found: error
          retention-days: 30
