# Non-secret LiteLLM OpenRouter example.
# Copy outside the repo before use. Keep provider and proxy keys in environment variables or a secret manager.

model_list:
  - model_name: codex-openrouter
    litellm_params:
      model: openrouter/openai/gpt-5.2
      api_key: "os.environ/OPENROUTER_API_KEY"
      api_base: "https://openrouter.ai/api/v1"
      rpm: 60

litellm_settings:
  drop_params: true
  turn_off_message_logging: true
  redact_user_api_key_info: true

# Prefer setting LITELLM_MASTER_KEY in the environment.
# Use generated virtual keys for shared clients.
